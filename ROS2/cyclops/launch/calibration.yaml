launch:
- arg:
    name: ns
    default: ""

- include:
    file: "$(find-pkg-share cyclops)/launch/sensors.yaml"

- node: # RGB Camera
    pkg: cyclops
    exec: calibrate
    name: cal
    namespace: "$(var ns)/left"

- node: # TOF Camera
    pkg: cyclops
    exec: calibrate
    name: cal
    namespace: "$(var ns)/right"

- group:
  - push_ros_namespace:
      namespace: "$(var ns)/imu"
  - include:
      file: "$(find-pkg-share mimu_calibrate)/launch/calibration_suite.yaml"
      arg:
        - name: ns
          value: "$(var ns)/imu"

- node: # LEFT -> RIGHT
    pkg: cyclops
    exec: calibrate_dual
    name: cal
    namespace: "$(var ns)/left_right"
    param:
      - name: ns_a
        value: "$(var ns)/left"
      - name: ns_b
        value: "$(var ns)/right"
    remap:
      - from: set_transform
        to: /tf/left_right/set_transform

- node: # LEFT -> IMU
    pkg: cyclops
    exec: calibrate_cam_imu
    name: cal
    namespace: "$(var ns)/left_imu"
    param:
      - name: ns_cam
        value: "$(var ns)/left"
      - name: ns_imu
        value: "$(var ns)/imu"
      - name: imu_topic
        value: imu_rect
      - name: imu_noise_url
        value: "cal/imu_noise.yaml"
      - name: cal_dir
        value: cam_imu
    remap:
      - from: set_transform
        to: /tf/rgb_imu/set_transform
