launch:
- arg:
    name: ns
    default: ""

- include:
    file: "$(find-pkg-share cyclops)/launch/binoc.py"


- node:
    pkg: ros2_rtimu
    exec: imu
    name: imu
    namespace: "$(var ns)/imu"
    output: screen

- node:
    pkg: mimu_calibrate
    exec: rectify
    name: rectify
    namespace: "$(var ns)/imu"
    remap:
      - from: magnetic_raw
        to: mag_raw
      - from: magnetic_rect
        to: mag_rect


