- node:
    pkg: cyclops
    exec: tf2_dynamic
    name: left_right
    namespace: /tf
    param:
      - name: frame
        value: left
      - name: child_frame
        value: right

- node:
    pkg: cyclops
    exec: tf2_dynamic
    name: left_imu
    namespace: /tf
    param:
      - name: frame
        value: left
      - name: child_frame
        value: imu
