launch:
- arg:
    name: ns
    default: ""

- include:
    file: "$(find-pkg-share cyclops)/launch/binoc.py"


#- node:
#    pkg: ros2_rtimu
#    exec: imu
#    name: imu
#    namespace: "$(var ns)/imu"
#    output: screen

- node:
    pkg: mimu_calibrate
    exec: rectify_node
    name: rectify
    namespace: "$(var ns)/imu"
    remap:
      - from: magnetic_raw
        to: mag_raw
      - from: magnetic_rect
        to: mag_rect

- node:
    pkg: icm20948_ros2
    exec: icm20948_raw
    name: imu
    namespace: "$(var ns)/imu"
    param:
      - name: i2c_bus
        value: 1
      - name: i2c_address
        value: 0x69
      - name: odr
        value: 50
      - name: gyro_fss
        value: 1000
    remap:
      - from: imu
        to: imu_raw
      - from: mag
        to: mag_raw


#- node:
#    pkg: cyclops
#    exec: tf2_dynamic
#    name: map_rgb
#    namespace: /tf
#    param:
#      - name: frame
#        value: map
#      - name: child_frame
#        value: rgb

- node:
    pkg: cyclops
    exec: tf2_dynamic
    name: left_right
    namespace: /tf
    param:
      - name: frame
        value: left
      - name: child_frame
        value: right
      - name: inverted
        value: true

- node:
    pkg: cyclops
    exec: tf2_dynamic
    name: left_imu
    namespace: /tf
    param:
      - name: frame
        value: left
      - name: child_frame
        value: imu
